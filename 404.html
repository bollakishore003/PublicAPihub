<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>

  <script>
    // 🔒 Force HTTPS
    if (location.protocol !== 'https:') {
      location.replace('https://' + location.host + location.pathname + location.search);
    }

    // Save path for SPA redirect
    sessionStorage.redirect = location.pathname + location.search;

    // Redirect to homepage
    window.location.replace('/');
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f9fafb;
    }

    .box {
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      color: #666;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>🔄 Redirecting...</h1>
    <p>Please wait...</p>
  </div>
</body>
</html>
