<style>
/* ==============================
   RESET & BASE
============================== */
*, *::before, *::after {
  box-sizing: border-box;
}

:root {
  --bg: #f9fafb;
  --card: #ffffff;
  --text: #111;
  --muted: #666;
  --border: #e5e7eb;
  --header-h: 60px;
}

body.dark {
  --bg: #0f172a;
  --card: #111827;
  --text: #f9fafb;
  --muted: #9ca3af;
  --border: #1f2937;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ==============================
   HEADER
============================== */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: var(--header-h);
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 12px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.header-left img {
  height: 38px;
  flex-shrink: 0;
}

.header-left h3 {
  margin: 0;
  font-size: 16px;
  white-space: nowrap;
}

.header-subtitle {
  margin: 0;
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

/* Hamburger — hidden on desktop */
.hamburger {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 6px;
  font-size: 22px;
  color: var(--text);
  line-height: 1;
  flex-shrink: 0;
}

/* ==============================
   LAYOUT
============================== */
.container {
  display: flex;
  height: calc(100vh - var(--header-h));
}

/* ==============================
   SIDEBAR OVERLAY (mobile)
============================== */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: 198;
}

.sidebar-overlay.active {
  display: block;
}

/* ==============================
   SIDEBAR
============================== */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--card);
  border-right: 1px solid var(--border);
  padding: 14px;
  overflow-y: auto;
}

.category {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}

.category:hover {
  background: rgba(0, 0, 0, 0.05);
}

body.dark .category:hover {
  background: rgba(255, 255, 255, 0.05);
}

.category.active {
  background: #2563eb;
  color: white;
  font-weight: 600;
}

/* ==============================
   MAIN
============================== */
.main {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  min-width: 0;
}

/* ==============================
   SEARCH
============================== */
.search {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  width: 100%;
  margin-bottom: 15px;
  font-size: 14px;
  background: var(--card);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

.search:focus {
  border-color: #2563eb;
}

/* ==============================
   GRID
============================== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

/* ==============================
   CARD
============================== */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  transition: transform 0.3s, box-shadow 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
}

.card-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* TITLE */
.title {
  display: flex;
  align-items: center;
  font-weight: 600;
  font-size: 15px;
}

.logo {
  width: 40px;
  height: 40px;
  object-fit: contain;
  border-radius: 8px;
  background: #fff;
  padding: 4px;
  flex-shrink: 0;
}

.api-link {
  cursor: pointer;
  color: #2563eb;
}

.api-link:hover {
  text-decoration: underline;
}

/* DESC */
.desc {
  color: var(--muted);
  font-size: 14px;
  margin-top: 10px;
  line-height: 1.5;
}

/* FAVORITE */
.fav {
  cursor: pointer;
}

/* ==============================
   AD BANNER
============================== */
.ad {
  border: 1px dashed var(--border);
  padding: 16px 20px;
  text-align: center;
  margin: 0 0 16px;
  border-radius: 12px;
  background: linear-gradient(135deg, #f3f4f6, #ffffff);
  color: var(--muted);
  font-size: 14px;
}

body.dark .ad {
  background: linear-gradient(135deg, #1f2937, #111827);
}

/* ==============================
   AD CARD (inline grid)
============================== */
.ad-card {
  background: var(--card);
  border: 1px dashed var(--border);
  border-radius: 14px;
  padding: 16px;
  transition: transform 0.3s;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.ad-card:hover {
  transform: translateY(-4px);
  border-color: #2563eb;
}

.ad-title {
  font-weight: 600;
  margin-bottom: 8px;
}

.ad-desc {
  font-size: 14px;
  color: var(--muted);
}

.ad-badge {
  margin-top: 10px;
  font-size: 12px;
  color: #2563eb;
}

body.dark .ad-card {
  background: linear-gradient(135deg, #1f2937, #111827);
}

/* ==============================
   NAV LINKS
============================== */
.nav-link {
  cursor: pointer;
  font-size: 14px;
  color: var(--muted);
  transition: color 0.2s;
  white-space: nowrap;
}

.nav-link:hover {
  color: #2563eb;
}

/* ==============================
   PAGINATION
============================== */
.pagination {
  text-align: center;
  margin-top: 24px;
  padding-bottom: 16px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 4px;
}

.page-btn {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  cursor: pointer;
  transition: 0.2s;
  font-size: 14px;
}

.page-btn:hover:not(:disabled) {
  background: #2563eb;
  color: white;
}

.page-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.page-num {
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
  font-size: 14px;
  color: var(--text);
}

.page-num:hover {
  background: rgba(37, 99, 235, 0.1);
}

.active-page {
  background: #2563eb;
  color: white;
  font-weight: 600;
}

.dots {
  padding: 8px 4px;
  color: var(--muted);
}

/* ==============================
   MODAL
============================== */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
  z-index: 300;
}

.modal-content {
  background: var(--card);
  padding: 24px;
  border-radius: 16px;
  width: 100%;
  max-width: 500px;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 22px;
  line-height: 1;
}

/* ==============================
   TABLET  (≤ 1024px)
============================== */
@media (max-width: 1024px) {
  .sidebar {
    width: 220px;
  }

  .header-subtitle {
    display: none;
  }

  .grid {
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
}

/* ==============================
   MOBILE  (≤ 768px)
============================== */
@media (max-width: 768px) {

  /* Show hamburger */
  .hamburger {
    display: block;
  }

  /* Sidebar becomes a fixed drawer */
  .sidebar {
    position: fixed;
    top: 0;
    left: -280px;
    width: 260px;
    height: 100%;
    z-index: 200;
    padding-top: 70px;
    transition: left 0.3s ease;
    box-shadow: none;
  }

  .sidebar.open {
    left: 0;
    box-shadow: 4px 0 20px rgba(0, 0, 0, 0.15);
  }

  /* Container takes full width */
  .container {
    height: auto;
    min-height: calc(100vh - var(--header-h));
  }

  /* Main fills full width */
  .main {
    padding: 12px;
    width: 100%;
  }

  /* Single-column grid */
  .grid {
    grid-template-columns: 1fr;
    gap: 12px;
  }

  /* Smaller header text */
  .header-left h3 {
    font-size: 14px;
  }

  /* Compact nav */
  .nav-link {
    font-size: 13px;
  }

  /* Pagination touch-friendly */
  .page-btn,
  .page-num {
    padding: 8px 10px;
    font-size: 13px;
  }

  /* Ad banner compact */
  .ad {
    padding: 12px;
    font-size: 13px;
  }
}

/* ==============================
   SMALL MOBILE  (≤ 480px)
============================== */
@media (max-width: 480px) {
  header {
    padding: 0 12px;
  }

  .header-right {
    gap: 8px;
  }

  .main {
    padding: 10px;
  }

  .modal-content {
    padding: 18px;
  }
}
</style>

<body>

<header>

  <!-- Hamburger (mobile only) -->
  <button class="hamburger" id="hamburgerBtn" aria-label="Toggle categories menu" onclick="toggleSidebar()">☰</button>

  <!-- Left: Logo + Title -->
  <div class="header-left">
    <img src="/mylogo.png" alt="Public API Hub Logo">
    <div>
      <h3>Public API Hub</h3>
      <p class="header-subtitle">Browse hundreds of free public APIs categorized for developers.</p>
    </div>
  </div>

  <!-- Right: Navigation -->
  <div class="header-right">
    <span class="nav-link" onclick="openStatic('about')">About</span>
    <span class="nav-link" onclick="openStatic('privacy')">Privacy</span>
    <button onclick="toggleDark()" style="background:none;border:none;cursor:pointer;font-size:18px;">🌙</button>
  </div>

</header>

<!-- Sidebar overlay (mobile tap-to-close) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="container">

<div class="sidebar" id="sidebar">
  <input class="search" placeholder="Search categories..." onkeyup="filterCategories(this.value)">
  <div id="categories"></div>
</div>

<div class="main">
  <input class="search" placeholder="🔍 Search APIs..." onkeyup="searchAPI(this.value)">

  <div class="ad">
    💰 Your Ad Here (Google AdSense / Sponsor)
  </div>

  <div id="list" class="grid"></div>
  <div class="pagination" id="pages"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal(event)">
  <div class="modal-content">
    <span class="close" onclick="closeModal(event)">×</span>
    <div id="modalBody"></div>
  </div>
</div>

<script>
let raw = {};
let all = [];
let filtered = [];
let page = 1;
const limit = 12;
let favs = JSON.parse(localStorage.getItem("fav")) || [];
let activeCategory = "All";

/* =========================
   URL CATEGORY LOGIC
========================= */

// Handle redirect from 404
(function () {
  const redirect = sessionStorage.getItem("redirect");
  if (redirect) {
    sessionStorage.removeItem("redirect");
    window.history.replaceState(null, null, redirect);
  }
})();

function slugify(str) {
  return str
    .toLowerCase()
    .trim()
    .replace(/[^\w\s-]/g, "")
    .replace(/\s+/g, "-");
}

/* =========================
   API MAPPING
========================= */
function mapAPI(api) {
  return {
    name: api.name || "Unknown API",
    desc: api.description || "No description available",
    link: api.link || "",
    pricing: api.pricing || "Free",
    auth: api.auth || "No Auth",
    https: api.https || false,
    logo: api.logo || "",
    sponsored: api.sponsored || false
  };
}

/* =========================
   FETCH DATA (ONCE, WITH TIMEOUT)
========================= */
function fetchWithTimeout(url, ms) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), ms);

  return fetch(url, { signal: controller.signal }).finally(() =>
    clearTimeout(id)
  );
}

fetchWithTimeout("/Public_APIs_Organized.json", 10000)
  .then((r) => {
    if (!r.ok) {
      throw new Error("HTTP " + r.status);
    }
    return r.json();
  })
  .then((j) => {
    raw = j;
    if (!raw || Object.keys(raw).length === 0) return;

    all = [];
    Object.keys(j).forEach((cat) => {
      j[cat].forEach((a) => {
        const x = mapAPI(a);
        x.cat = cat;
        all.push(x);
      });
    });

    console.log("Loaded categories:", Object.keys(raw));
    console.log("Total APIs:", all.length);

    filtered = [...all];
    applyCategoryFromURL();
    loadCategories();
    render();
  })
  .catch((err) => {
    console.error("JSON load failed:", err);
  });

/* =========================
   APPLY CATEGORY FROM URL
========================= */
function applyCategoryFromURL() {
  const path = window.location.pathname;
  let slug = null;

  if (path.startsWith("/category/")) {
    slug = decodeURIComponent(path.split("/category/")[1]);
    if (slug.endsWith("/")) slug = slug.slice(0, -1);
  }

  if (!slug || slug === "all") {
    activeCategory = "All";
    filtered = [...all];
    page = 1;
    return;
  }

  const found = Object.keys(raw).find((c) => slugify(c) === slug);

  if (found) {
    activeCategory = found;
    filtered = all.filter((x) => x.cat === found);
    document.title = found + " APIs - Public API Hub";
  } else {
    activeCategory = "All";
    filtered = [...all];
  }

  page = 1;
}

/* =========================
   CATEGORY UI
========================= */
function loadCategories() {
  const el = document.getElementById("categories");

  el.innerHTML = `
    <div class="category ${
      activeCategory === "All" ? "active" : ""
    }" onclick="navigateCategory('All')">
      All
    </div>
  `;

  Object.keys(raw).forEach((c) => {
    el.innerHTML += `
      <div class="category ${
        activeCategory === c ? "active" : ""
      }" onclick="navigateCategory('${c}')">
        ${c}
      </div>
    `;
  });
}

function filterCategories(val) {
  const el = document.getElementById("categories");
  const search = val.toLowerCase();

  el.innerHTML = `
    <div class="category ${
      activeCategory === "All" ? "active" : ""
    }" onclick="navigateCategory('All')">
      All
    </div>
  `;

  Object.keys(raw)
    .filter((c) => c.toLowerCase().includes(search))
    .forEach((c) => {
      el.innerHTML += `
        <div class="category ${
          activeCategory === c ? "active" : ""
        }" onclick="navigateCategory('${c}')">
          ${c}
        </div>
      `;
    });
}

/* =========================
   NAVIGATION (NO RELOAD)
========================= */
function navigateCategory(cat) {
  let url = "/";

  if (cat !== "All") {
    const slug = slugify(cat);
    url = "/category/" + slug;
  }

  window.history.pushState({}, "", url);

  applyCategoryFromURL();
  loadCategories();
  render();

  // Auto-close sidebar on mobile after selecting a category
  if (window.innerWidth <= 768) {
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("sidebarOverlay");
    if (sidebar && sidebar.classList.contains("open")) {
      sidebar.classList.remove("open");
      overlay.classList.remove("active");
      document.body.style.overflow = "";
    }
  }
}

window.onpopstate = () => {
  applyCategoryFromURL();
  loadCategories();
  render();
};

/* =========================
   RENDER
========================= */
function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  const start = (page - 1) * limit;
  const data = filtered.slice(start, start + limit);

  data.forEach((api, index) => {
    const realIndex = start + index;

    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => openModal(realIndex);

    card.innerHTML = `
      <img class="logo" src="/apilogo.png">

        <div class="title">
          ${api.name}
        </div>
      </div>
      <div class="desc">${api.desc}</div>
    `;

    list.appendChild(card);

    if ((index + 1) % 6 === 0) {
      const ad = document.createElement("div");
      ad.className = "ad-card";

      ad.innerHTML = `
        <div class="card-top">
          <div class="title">
            Promote Your API 🚀
          </div>
        </div>
        <div class="desc">
          Get featured here and reach thousands of developers.
        </div>
        <div class="ad-badge">💰 Sponsored</div>
      `;

      ad.onclick = () => {
        window.open("https://your-promo-link.com", "_blank");
      };

      list.appendChild(ad);
    }
  });

  paginate();
}

/* =========================
   PAGINATION
========================= */
function paginate() {
  const total = Math.ceil(filtered.length / limit);
  const el = document.getElementById("pages");

  if (total <= 1) {
    el.innerHTML = "";
    return;
  }

  let html = "";

  // PREVIOUS BUTTON
  html += `
    <button onclick="goto(${page - 1})"
      ${page === 1 ? "disabled" : ""}
      class="page-btn">
      ← Prev
    </button>
  `;

  let start = Math.max(1, page - 2);
  let end = Math.min(total, page + 2);

  if (start > 1) {
    html += `<span class="page-num" onclick="goto(1)">1</span>`;
    if (start > 2) html += `<span class="dots">...</span>`;
  }

  for (let i = start; i <= end; i++) {
    html += `
      <span onclick="goto(${i})"
        class="page-num ${i === page ? "active-page" : ""}">
        ${i}
      </span>
    `;
  }

  if (end < total) {
    if (end < total - 1) html += `<span class="dots">...</span>`;
    html += `<span class="page-num" onclick="goto(${total})">${total}</span>`;
  }

  // NEXT BUTTON
  html += `
    <button onclick="goto(${page + 1})"
      ${page === total ? "disabled" : ""}
      class="page-btn">
      Next →
    </button>
  `;

  el.innerHTML = html;
}

function goto(p) {
  page = p;
  render();
}

/* =========================
   SEARCH
========================= */
function searchAPI(val) {
  const search = val.toLowerCase();

  filtered = all.filter(
    (x) =>
      (activeCategory === "All" || x.cat === activeCategory) &&
      x.name.toLowerCase().includes(search)
  );

  page = 1;
  render();
}

/* =========================
   MODAL
========================= */
function openModal(i) {
  const api = filtered[i];
  if (!api) return;

  const modal = document.getElementById("modal");
  const body = document.getElementById("modalBody");

  const isPaid = api.pricing.toLowerCase().includes("paid");

  body.innerHTML = `
    <h2>${api.name}</h2>
    <p>${api.desc}</p>
    <div style="margin:15px 0">
      <span style="
        padding:6px 10px;
        border-radius:8px;
        color:white;
        background:${isPaid ? "#ef4444" : "#10b981"};
      ">
        ${isPaid ? "💰 Paid" : "🆓 Free"}
      </span>
    </div>
    <a href="${api.link}" target="_blank"
      style="
        display:inline-block;
        padding:10px 16px;
        background:#2563eb;
        color:white;
        border-radius:8px;
        text-decoration:none;
      ">
      🔗 Visit API
    </a>
  `;

  modal.style.display = "flex";
}

function closeModal(e) {
  if (e.target.id === "modal" || e.target.classList.contains("close")) {
    document.getElementById("modal").style.display = "none";
  }
}

/* =========================
   DARK MODE
========================= */
function toggleDark() {
  document.body.classList.toggle("dark");
}

/* =========================
   SIDEBAR TOGGLE (mobile)
========================= */
function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebarOverlay");
  const isOpen = sidebar.classList.contains("open");

  if (isOpen) {
    sidebar.classList.remove("open");
    overlay.classList.remove("active");
    document.body.style.overflow = "";
  } else {
    sidebar.classList.add("open");
    overlay.classList.add("active");
    document.body.style.overflow = "hidden";
  }
}

// Close sidebar on window resize to desktop width
window.addEventListener("resize", function () {
  if (window.innerWidth > 768) {
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("sidebarOverlay");
    sidebar.classList.remove("open");
    overlay.classList.remove("active");
    document.body.style.overflow = "";
  }
});
</script>
