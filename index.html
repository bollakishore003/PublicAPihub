<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="Dz-liSGHoJXrpaSC-rHy3cZK1atu62iAAy1KnKrQ8JM" />

<link rel="icon" href="data:,">
<title>Public API Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f9fafb;
  --card: #ffffff;
  --text: #111;
  --muted: #666;
  --border: #e5e7eb;
}

body.dark {
  --bg: #0f172a;
  --card: #111827;
  --text: #f9fafb;
  --muted: #9ca3af;
  --border: #1f2937;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 16px 24px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}

/* LAYOUT */
.container {
  display: flex;
  height: calc(100vh - 65px);
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: var(--card);
  border-right: 1px solid var(--border);
  padding: 15px;
  overflow-y: auto;
}

.category {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.category:hover {
  background: rgba(0,0,0,0.05);
}

body.dark .category:hover {
  background: rgba(255,255,255,0.05);
}

.category.active {
  background: #2563eb;
  color: white;
  font-weight: 600;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

/* SEARCH */
.search {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  width: 100%;
  margin-bottom: 15px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  transition: 0.3s;
  cursor: pointer; /* 👈 ADD THIS */
}

.card:hover {
  transform: translateY(-5px);
}

.card-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* TITLE */
.title {
  display: flex;
  align-items: center;
  font-weight: 600;
}


.logo {
  width: 40px;
  height: 40px;
  object-fit: contain;
  border-radius: 8px;
  background: #fff;
  padding: 4px;
  flex-shrink: 0;
}

.api-link {
  cursor: pointer;
  color: #2563eb;
}

.api-link:hover {
  text-decoration: underline;
}

/* DESC */
.desc {
  color: var(--muted);
  font-size: 14px;
  margin-top: 10px;
}

/* FAVORITE */
.fav {
  cursor: pointer;
}

/* PAGINATION */
.pagination {
  text-align: center;
  margin-top: 20px;
}

.page-btn {
  padding: 8px 14px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  transition: 0.2s;
}

.page-btn:hover:not(:disabled) {
  background: #2563eb;
  color: white;
}

.page-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.page-num {
  margin: 5px;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.page-num:hover {
  background: rgba(37, 99, 235, 0.1);
}

.active-page {
  background: #2563eb;
  color: white;
  font-weight: 600;
}

.dots {
  margin: 5px;
  color: var(--muted);
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: var(--card);
  padding: 25px;
  border-radius: 16px;
  width: 500px;
}
.ad {
  border: 1px dashed var(--border);
  padding: 20px;
  text-align: center;
  margin: 15px 0;
  border-radius: 12px;
  background: linear-gradient(135deg, #f3f4f6, #ffffff);
  color: var(--muted);
  font-size: 14px;
}

body.dark .ad {
  background: linear-gradient(135deg, #1f2937, #111827);
}

.ad-card {
  background: var(--card);
  border: 1px dashed var(--border);
  border-radius: 14px;
  padding: 16px;
  transition: 0.3s;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.ad-card:hover {
  transform: translateY(-5px);
  border-color: #2563eb;
}

.ad-title {
  font-weight: 600;
  margin-bottom: 8px;
}

.ad-desc {
  font-size: 14px;
  color: var(--muted);
}

.ad-badge {
  margin-top: 10px;
  font-size: 12px;
  color: #2563eb;
}

body.dark .ad-card {
  background: linear-gradient(135deg, #1f2937, #111827);
}
.nav-link {
  cursor: pointer;
  font-size: 14px;
  color: var(--muted);
  transition: 0.2s;
}

.nav-link:hover {
  color: #2563eb;
}

@media (max-width: 768px) {
  .ad-card {
    grid-column: span 1;
  }
}

.close {
  float: right;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h3>🚀 Public API Hub</h3>

  <div style="display:flex; gap:15px; align-items:center;">
    
    <span class="nav-link" onclick="openStatic('about')">About</span>
    <span class="nav-link" onclick="openStatic('privacy')">Privacy</span>

    <button onclick="toggleDark()">🌙</button>
  </div>
</header>

<div class="container">

<div class="sidebar">
  <input class="search" placeholder="Search categories..." onkeyup="filterCategories(this.value)">
  <div id="categories"></div>
</div>

<div class="main">
  <input class="search" placeholder="🔍 Search APIs..." onkeyup="searchAPI(this.value)">

  <div class="ad">
    💰 Your Ad Here (Google AdSense / Sponsor)
  </div>

  <div id="list" class="grid"></div>
  <div class="pagination" id="pages"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal(event)">
  <div class="modal-content">
    <span class="close" onclick="closeModal(event)">×</span>
    <div id="modalBody"></div>
  </div>
</div>

<script>
let raw = {};
let all = [];
let filtered = [];
let page = 1;
const limit = 12;
let favs = JSON.parse(localStorage.getItem("fav")) || [];
let activeCategory = "All";

/* =========================
   URL CATEGORY LOGIC
========================= */

// Handle redirect from 404
(function () {
  const redirect = sessionStorage.getItem("redirect");
  if (redirect) {
    sessionStorage.removeItem("redirect");
    window.history.replaceState(null, null, redirect);
  }
})();

function slugify(str) {
  return str
    .toLowerCase()
    .trim()
    .replace(/[^\w\s-]/g, "")
    .replace(/\s+/g, "-");
}

/* =========================
   API MAPPING
========================= */
function mapAPI(api) {
  return {
    name: api.name || "Unknown API",
    desc: api.description || "No description available",
    link: api.link || "",
    pricing: api.pricing || "Free",
    auth: api.auth || "No Auth",
    https: api.https || false,
    logo: api.logo || "",
    sponsored: api.sponsored || false
  };
}

/* =========================
   FETCH DATA (ONCE, WITH TIMEOUT)
========================= */
function fetchWithTimeout(url, ms) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), ms);

  return fetch(url, { signal: controller.signal }).finally(() =>
    clearTimeout(id)
  );
}

fetchWithTimeout("/Public_APIs_Organized.json", 10000)
  .then((r) => {
    if (!r.ok) {
      throw new Error("HTTP " + r.status);
    }
    return r.json();
  })
  .then((j) => {
    raw = j;
    if (!raw || Object.keys(raw).length === 0) return;

    all = [];
    Object.keys(j).forEach((cat) => {
      j[cat].forEach((a) => {
        const x = mapAPI(a);
        x.cat = cat;
        all.push(x);
      });
    });

    console.log("Loaded categories:", Object.keys(raw));
    console.log("Total APIs:", all.length);

    filtered = [...all];
    applyCategoryFromURL();
    loadCategories();
    render();
  })
  .catch((err) => {
    console.error("JSON load failed:", err);
  });

/* =========================
   APPLY CATEGORY FROM URL
========================= */
function applyCategoryFromURL() {
  const path = window.location.pathname;
  let slug = null;

  if (path.startsWith("/category/")) {
    slug = decodeURIComponent(path.split("/category/")[1]);
    if (slug.endsWith("/")) slug = slug.slice(0, -1);
  }

  if (!slug || slug === "all") {
    activeCategory = "All";
    filtered = [...all];
    page = 1;
    return;
  }

  const found = Object.keys(raw).find((c) => slugify(c) === slug);

  if (found) {
    activeCategory = found;
    filtered = all.filter((x) => x.cat === found);
    document.title = found + " APIs - Public API Hub";
  } else {
    activeCategory = "All";
    filtered = [...all];
  }

  page = 1;
}

/* =========================
   CATEGORY UI
========================= */
function loadCategories() {
  const el = document.getElementById("categories");

  el.innerHTML = `
    <div class="category ${
      activeCategory === "All" ? "active" : ""
    }" onclick="navigateCategory('All')">
      All
    </div>
  `;

  Object.keys(raw).forEach((c) => {
    el.innerHTML += `
      <div class="category ${
        activeCategory === c ? "active" : ""
      }" onclick="navigateCategory('${c}')">
        ${c}
      </div>
    `;
  });
}

function filterCategories(val) {
  const el = document.getElementById("categories");
  const search = val.toLowerCase();

  el.innerHTML = `
    <div class="category ${
      activeCategory === "All" ? "active" : ""
    }" onclick="navigateCategory('All')">
      All
    </div>
  `;

  Object.keys(raw)
    .filter((c) => c.toLowerCase().includes(search))
    .forEach((c) => {
      el.innerHTML += `
        <div class="category ${
          activeCategory === c ? "active" : ""
        }" onclick="navigateCategory('${c}')">
          ${c}
        </div>
      `;
    });
}

/* =========================
   NAVIGATION (NO RELOAD)
========================= */
function navigateCategory(cat) {
  let url = "/";

  if (cat !== "All") {
    const slug = slugify(cat);
    url = "/category/" + slug;
  }

  window.history.pushState({}, "", url);

  applyCategoryFromURL();
  loadCategories();
  render();
}

window.onpopstate = () => {
  applyCategoryFromURL();
  loadCategories();
  render();
};

/* =========================
   RENDER
========================= */
function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  const start = (page - 1) * limit;
  const data = filtered.slice(start, start + limit);

  data.forEach((api, index) => {
    const realIndex = start + index;

    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => openModal(realIndex);

    card.innerHTML = `
      <img class="logo" src="/apilogo.png">

        <div class="title">
          ${api.name}
        </div>
      </div>
      <div class="desc">${api.desc}</div>
    `;

    list.appendChild(card);

    if ((index + 1) % 6 === 0) {
      const ad = document.createElement("div");
      ad.className = "ad-card";

      ad.innerHTML = `
        <div class="card-top">
          <div class="title">
            Promote Your API 🚀
          </div>
        </div>
        <div class="desc">
          Get featured here and reach thousands of developers.
        </div>
        <div class="ad-badge">💰 Sponsored</div>
      `;

      ad.onclick = () => {
        window.open("https://your-promo-link.com", "_blank");
      };

      list.appendChild(ad);
    }
  });

  paginate();
}

/* =========================
   PAGINATION
========================= */
function paginate() {
  const total = Math.ceil(filtered.length / limit);
  const el = document.getElementById("pages");

  if (total <= 1) {
    el.innerHTML = "";
    return;
  }

  let html = "";

  // PREVIOUS BUTTON
  html += `
    <button onclick="goto(${page - 1})"
      ${page === 1 ? "disabled" : ""}
      class="page-btn">
      ← Prev
    </button>
  `;

  let start = Math.max(1, page - 2);
  let end = Math.min(total, page + 2);

  if (start > 1) {
    html += `<span class="page-num" onclick="goto(1)">1</span>`;
    if (start > 2) html += `<span class="dots">...</span>`;
  }

  for (let i = start; i <= end; i++) {
    html += `
      <span onclick="goto(${i})"
        class="page-num ${i === page ? "active-page" : ""}">
        ${i}
      </span>
    `;
  }

  if (end < total) {
    if (end < total - 1) html += `<span class="dots">...</span>`;
    html += `<span class="page-num" onclick="goto(${total})">${total}</span>`;
  }

  // NEXT BUTTON
  html += `
    <button onclick="goto(${page + 1})"
      ${page === total ? "disabled" : ""}
      class="page-btn">
      Next →
    </button>
  `;

  el.innerHTML = html;
}

function goto(p) {
  page = p;
  render();
}

/* =========================
   SEARCH
========================= */
function searchAPI(val) {
  const search = val.toLowerCase();

  filtered = all.filter(
    (x) =>
      (activeCategory === "All" || x.cat === activeCategory) &&
      x.name.toLowerCase().includes(search)
  );

  page = 1;
  render();
}

/* =========================
   MODAL
========================= */
function openModal(i) {
  const api = filtered[i];
  if (!api) return;

  const modal = document.getElementById("modal");
  const body = document.getElementById("modalBody");

  const isPaid = api.pricing.toLowerCase().includes("paid");

  body.innerHTML = `
    <h2>${api.name}</h2>
    <p>${api.desc}</p>
    <div style="margin:15px 0">
      <span style="
        padding:6px 10px;
        border-radius:8px;
        color:white;
        background:${isPaid ? "#ef4444" : "#10b981"};
      ">
        ${isPaid ? "💰 Paid" : "🆓 Free"}
      </span>
    </div>
    <a href="${api.link}" target="_blank"
      style="
        display:inline-block;
        padding:10px 16px;
        background:#2563eb;
        color:white;
        border-radius:8px;
        text-decoration:none;
      ">
      🔗 Visit API
    </a>
  `;

  modal.style.display = "flex";
}

function closeModal(e) {
  if (e.target.id === "modal" || e.target.classList.contains("close")) {
    document.getElementById("modal").style.display = "none";
  }
}

/* =========================
   DARK MODE
========================= */
function toggleDark() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
